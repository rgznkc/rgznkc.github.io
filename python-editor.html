<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 在线编辑器</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.23.0/full/pyodide.js"></script>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Microsoft YaHei",sans-serif;
    }
    body{
        background:#1e1e1e;
        color:white;
        padding:20px;
    }
    .title{
        color:#ff7a2f;
        margin-bottom:15px;
        font-size:24px;
    }
    #codeArea{
        width:100%;
        height:380px;
        background:#000;
        color:#fff;
        padding:15px;
        font-size:16px;
        border:none;
        border-radius:8px;
        resize:none;
        font-family: monospace;
    }
    #runBtn{
        margin:12px 0;
        padding:12px 30px;
        background:#3498db;
        color:#fff;
        border:none;
        border-radius:8px;
        font-size:16px;
        cursor:pointer;
    }
    #output{
        background:#000;
        color:#fff;
        padding:15px;
        border-radius:8px;
        height:180px;
        overflow-y:auto;
        white-space: pre-wrap;
        font-family: monospace;
    }
</style>
</head>
<body>

    <h1 class="title">Python 编辑器（本地直接运行）</h1>
    <textarea id="codeArea">print("你好，Python")
print(1+2+3)
print("纯前端运行，无服务器")</textarea>
    <button id="runBtn">▶ 运行代码</button>
    <div id="output">输出结果将显示在这里...</div>

<script>
let pyodide;
let output = document.getElementById("output");

async function loadPyodideEngine() {
    output.textContent = "正在加载Python引擎...首次加载需要5-15秒，请稍等";
    try {
        pyodide = await loadPyodide();
        output.textContent = "✅ Python引擎加载完成，可以运行代码！";
    } catch (e) {
        output.textContent = "❌ 加载失败：" + e.toString();
    }
}

document.getElementById("runBtn").onclick = async function () {
    if (!pyodide) {
        output.textContent = "请等待Python引擎加载完成...";
        return;
    }
    let code = document.getElementById("codeArea").value;
    output.textContent = "⏳ 运行中...\n";

    try {
        pyodide.runPython(`
import sys
sys.stdout = sys.stderr = open('stdout.txt', 'w', encoding='utf-8')
        `);
        await pyodide.runPythonAsync(code);
        let res = pyodide.runPython("open('stdout.txt').read()");
        output.textContent = res;
    } catch (err) {
        output.textContent = "❌ 错误：\n" + err.toString();
    }
};

loadPyodideEngine();
</script>
</body>
</html>
