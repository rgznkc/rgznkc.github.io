<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>人工智能教育资源</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
    }

    body {
        background-color: #f9f9f9;
        padding: 60px 20px;
        text-align: center;
    }

    .main-title {
        font-size: 42px;
        font-weight: bold;
        color: #ff7a2f;
        margin-bottom: 70px;
    }

    .box-container {
        max-width: 1300px;
        margin: 0 auto 120px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 55px;
    }

    .rect-module {
        width: 200px;
        height: 100px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    .ellipse-container {
        max-width: 600px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        gap: 70px;
    }

    .ellipse-module {
        width: 240px;
        height: 90px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
    }

    .text-wrap {
        position: relative;
    }

    .txt {
        font-size: 18px;
        font-weight: bold;
        color: #fff;
    }

    .txt-reflect {
        position: absolute;
        top: 22px;
        left: 0;
        right: 0;
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        opacity: 0.25;
        transform: scaleY(-0.7);
        filter: blur(1px);
    }
</style>
</head>

<body>
    <h1 class="main-title">人工智能教育资源</h1>

    <div class="box-container">
        <div class="rect-module" style="background:#4a90e2">
            <div class="text-wrap"><div class="txt">人工智能</div><div class="txt-reflect">人工智能</div></div>
        </div>
        <div class="rect-module" style="background:#50c184">
            <div class="text-wrap"><div class="txt">机器人</div><div class="txt-reflect">机器人</div></div>
        </div>
        <div class="rect-module" style="background:#f5a623">
            <div class="text-wrap"><div class="txt">创客</div><div class="txt-reflect">创客</div></div>
        </div>
        <div class="rect-module" style="background:#bd10e0">
            <div class="text-wrap"><div class="txt">无人机</div><div class="txt-reflect">无人机</div></div>
        </div>
        <div class="rect-module" style="background:#ff4a4a">
            <div class="text-wrap"><div class="txt">3D打印和激光切割</div><div class="txt-reflect">3D打印和激光切割</div></div>
        </div>
        <div class="rect-module" style="background:#7ed321">
            <div class="text-wrap"><div class="txt">赛事服务</div><div class="txt-reflect">赛事服务</div></div>
        </div>
        <div class="rect-module" style="background:#27ae60">
            <div class="text-wrap"><div class="txt">课后服务</div><div class="txt-reflect">课后服务</div></div>
        </div>
        <div class="rect-module" style="background:#9013fe">
            <div class="text-wrap"><div class="txt">考试考级</div><div class="txt-reflect">考试考级</div></div>
        </div>
    </div>

    <div class="ellipse-container">
        <div id="pythonBtn" class="ellipse-module" style="background:#3498db">
            <div class="text-wrap"><div class="txt">Python编程</div><div class="txt-reflect">Python编程</div></div>
        </div>
        <div id="scratchBtn" class="ellipse-module" style="background:#e67e22">
            <div class="text-wrap"><div class="txt">图形化编程</div><div class="txt-reflect">图形化编程</div></div>
        </div>
    </div>

<script>
document.getElementById('scratchBtn').onclick = function(){
    window.open('http://lite.comecode.net/scratch/edit','_blank');
};
document.getElementById('pythonBtn').onclick = function(){
    window.open('python-editor.html','_blank');
};
</script>
</body>
</html>
